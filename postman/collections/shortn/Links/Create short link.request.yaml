$kind: http-request
name: Create short link
description: Creates a short link. The test script auto-saves the returned `code` into the `code` collection variable so the Redirect request works immediately.
url: "{{base_url}}/api/links"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "url": "https://example.com"
    }
scripts:
  - type: afterResponse
    code: |-
      // Save code for use in Redirect request
      const res = pm.response.json();
      if (res.code) {
          pm.collectionVariables.set('code', res.code);
      }

      pm.test("status is 201", () => {
          pm.response.to.have.status(201);
      });

      pm.test("response has code", () => {
          pm.expect(res.code).to.be.a('string').and.not.empty;
      });

      pm.test("response has short_url containing the code", () => {
          pm.expect(res.short_url).to.include(res.code);
      });

      pm.test("response has long_url", () => {
          pm.expect(res.long_url).to.be.a('string').and.not.empty;
      });

      pm.test("X-Served-By header is set", () => {
          const header = pm.response.headers.get("X-Served-By");
          pm.expect(header).to.match(/^api-\d+$/);
      });
    language: text/javascript
order: 1000
