upstream shortn_api {
    server api-1:8080;
    server api-2:8080;
    server api-3:8080;
}

server {
    listen 80;

    location / {
        proxy_pass http://shortn_api;

        # Forward the real client IP so application logs show the origin address,
        # not the nginx container address.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }
}
