name: shortn

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: shortn
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d shortn']
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: migrate/migrate # pin to CLI version (run: migrate -version)
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../migrations:/migrations
    command:
      [
        '-path',
        '/migrations',
        '-database',
        'postgres://dev:dev@postgres:5432/shortn?sslmode=disable',
        'up',
      ]

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: api
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: '8080'
      LOG_LEVEL: info
      ENV: dev
      DATABASE_URL: postgres://dev:dev@postgres:5432/shortn?sslmode=disable
    ports:
      - '8080:8080'

volumes:
  pgdata:
