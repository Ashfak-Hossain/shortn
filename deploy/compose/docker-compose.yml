name: shortn

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: shortn
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d shortn']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - '6379:6379'
    # No volume: a cache is ephemeral by design. If Redis is wiped, the app
    # repopulates it from Postgres on the next miss. Persisting it would only
    # buy us a warm cache after a restart, at the cost of stale data surviving.
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../migrations:/migrations
    command:
      [
        '-path',
        '/migrations',
        '-database',
        'postgres://dev:dev@postgres:5432/shortn?sslmode=disable',
        'up',
      ]

  api-1:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: '8080'
      LOG_LEVEL: info
      ENV: dev
      DATABASE_URL: postgres://dev:dev@postgres:5432/shortn?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      WORKER_ID: '0'
      INSTANCE_ID: api-1
      SQIDS_ALPHABET: '0aA1bB2cC3dD4eE5fF6gG7hH8iI9jJkKlLmMnNoOpPqQrRsStTuUvVwWxXyYzZ'

  api-2:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: '8080'
      LOG_LEVEL: info
      ENV: dev
      DATABASE_URL: postgres://dev:dev@postgres:5432/shortn?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      WORKER_ID: '1'
      INSTANCE_ID: api-2
      SQIDS_ALPHABET: '0aA1bB2cC3dD4eE5fF6gG7hH8iI9jJkKlLmMnNoOpPqQrRsStTuUvVwWxXyYzZ'

  api-3:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: '8080'
      LOG_LEVEL: info
      ENV: dev
      DATABASE_URL: postgres://dev:dev@postgres:5432/shortn?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      WORKER_ID: '2'
      INSTANCE_ID: api-3
      SQIDS_ALPHABET: '0aA1bB2cC3dD4eE5fF6gG7hH8iI9jJkKlLmMnNoOpPqQrRsStTuUvVwWxXyYzZ'

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-1
      - api-2
      - api-3

volumes:
  pgdata:
