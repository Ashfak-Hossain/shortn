name: shortn

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: shortn
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev -d shortn']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - '6379:6379'
    # No volume: a cache is ephemeral by design. If Redis is wiped, the app
    # repopulates it from Postgres on the next miss. Persisting it would only
    # buy us a warm cache after a restart, at the cost of stale data surviving.
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: migrate/migrate # pin to CLI version (run: migrate -version)
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../migrations:/migrations
    command:
      [
        '-path',
        '/migrations',
        '-database',
        'postgres://dev:dev@postgres:5432/shortn?sslmode=disable',
        'up',
      ]

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: '8080'
      LOG_LEVEL: info
      ENV: dev
      DATABASE_URL: postgres://dev:dev@postgres:5432/shortn?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - '8080:8080'

volumes:
  pgdata:
