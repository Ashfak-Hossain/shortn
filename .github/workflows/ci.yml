name: ci

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Start compose stack
        run: docker compose -f deploy/compose/docker-compose.yml up -d --build --wait
      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost/healthz && echo "API ready" && break
            echo "Waiting... ($i/30)" && sleep 3
          done
      - name: Run integration tests
        run: go test -tags integration -v ./test/... -count=1
      - name: Tear down compose stack
        if: always()
        run: docker compose -f deploy/compose/docker-compose.yml down

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --build-arg SERVICE=api -t shortn-api:ci .
